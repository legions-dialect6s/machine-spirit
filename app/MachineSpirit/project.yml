# MachineSpirit.app — XcodeGen spec. Regenerate the project with:
#   cd app/MachineSpirit && xcodegen generate
# The generated .xcodeproj is committed so a clone builds without xcodegen.
name: MachineSpirit
options:
  bundleIdPrefix: com.machinespirit
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  MachineSpiritKit:
    path: ../../kit/MachineSpiritKit
  # The in-app sheol ledger terminal. MIT; pinned exact so updates are
  # deliberate. Vendor/fork the moment we need to patch it (#32).
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: 1.5.0
targets:
  MachineSpirit:
    type: application
    platform: macOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: MachineSpiritKit
      - package: SwiftTerm
    # The fired ping (#36): the fork calls machinespirit://fired?path=…
    # when a bind executes; the board answers with a pulse.
    info:
      path: Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.machinespirit.MachineSpirit
            CFBundleURLSchemes: [machinespirit]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.machinespirit.MachineSpirit
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        # No sandbox: the app reads Leader Key's live config in
        # ~/Library/Application Support (read-only, Phase-1 law).
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
